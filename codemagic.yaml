# Codemagic CI for 小嘉时钟 (JiaClock)
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-native-ios-app/
#
# ── Codemagic 控制台一次性配置 ─────────────────────────────────────────────
# 1. https://codemagic.io → Add application → GitHub → WangFang88/JiaClock
# 2. 勾选 "Use codemagic.yaml"（不要用 UI 向导覆盖 yaml）
# 3. 先跑 jiaclock-ios-simulator（无需签名，验证工程能否编译）
# 4. TestFlight 见 README「Codemagic 配置」章节
#
# 环境变量组（Settings → Environment variables → Add group: jiaclock_secrets）:
#   APP_STORE_APPLE_ID = App Store Connect 里应用的数字 Apple ID（非 Bundle ID）

workflows:
  # ---------------------------------------------------------------------------
  # Workflow A: 模拟器编译 — 无需 Apple 签名，push 后自动跑
  # ---------------------------------------------------------------------------
  jiaclock-ios-simulator:
    name: JiaClock iOS Simulator Build
    max_build_duration: 45
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "*"
          include: true
      cancel_previous_builds: true

    environment:
      xcode: latest
      vars:
        XCODE_SCHEME: JiaClock
        XCODE_PROJECT: JiaClock.xcodeproj

    scripts:
      - name: List available simulators
        script: xcrun simctl list devices available | head -30

      - name: Simulator build (main app + widget extension)
        script: |
          set -euo pipefail
          xcodebuild build \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            | tee /tmp/xcodebuild.log \
            | xcpretty --color --simple

    publishing:
      scripts:
        - name: Build summary
          script: |
            echo "✅ Simulator build succeeded."
            echo "Next: configure signing and run jiaclock-testflight manually."

  # ---------------------------------------------------------------------------
  # Workflow B: 签名 .ipa → TestFlight（默认手动触发，配置完签名后再开自动）
  # ---------------------------------------------------------------------------
  jiaclock-testflight:
    name: JiaClock TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      # 集成名称须与 Codemagic Team integrations 里一致（当前为 reminderapp）
      app_store_connect: reminderapp

    # 默认仅手动触发，避免签名未配好时 push 失败
    # 配置完成后可改为 push + main 分支自动构建：
    #   events: [push]
    #   branch_patterns: [{ pattern: main, include: true }]
    triggering:
      events: []

    environment:
      ios_signing:
        distribution_type: app_store
        # 主 App Bundle ID；Codemagic 会自动匹配 jdarray.JiaClock.*（含 Widget）
        bundle_identifier: jdarray.JiaClock
      groups:
        - jiaclock_secrets
      vars:
        XCODE_SCHEME: JiaClock
        XCODE_PROJECT: JiaClock.xcodeproj
        # 在 jiaclock_secrets 组里设置 APP_STORE_APPLE_ID（纯数字）
        APP_STORE_APPLE_ID: $APP_STORE_APPLE_ID
      xcode: latest

    scripts:
      - name: Verify signing prerequisites
        script: |
          set -euo pipefail
          if [ -z "${APP_STORE_APPLE_ID:-}" ] || [ "$APP_STORE_APPLE_ID" = "0000000000" ]; then
            echo "ERROR: Set APP_STORE_APPLE_ID in Codemagic group 'jiaclock_secrets'."
            echo "Find it in App Store Connect → App → App Information → Apple ID."
            exit 1
          fi

      # 签名文件请在 Codemagic → Code signing identities 里配置（Generate certificate + Fetch profiles）
      # 不要在构建脚本里 --create 证书，否则会报 "Cannot save Signing Certificates without certificate private key"

      - name: Apply provisioning profiles to Xcode project
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build signed ipa (app + JiaClockWidgetExtension)
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            2>&1 | tee /tmp/xcodebuild-ipa.log

      - name: Verify App Store Connect API access
        script: |
          set -euo pipefail
          echo "=== API key: reminderapp ==="
          echo "Expected bundle ID: jdarray.JiaClock"
          echo "APP_STORE_APPLE_ID: ${APP_STORE_APPLE_ID:-<not set>}"
          echo "--- Registered bundle IDs (grep JiaClock) ---"
          app-store-connect bundle-ids list 2>&1 | grep -i "JiaClock" || echo "NOT FOUND in Developer Portal"
          echo "--- App Store Connect apps (must contain jdarray.JiaClock) ---"
          app-store-connect apps list 2>&1 | tee /tmp/asc-apps.log
          if ! grep -qi "JiaClock" /tmp/asc-apps.log; then
            echo ""
            echo "ERROR: No App Store Connect app for jdarray.JiaClock."
            echo "Fix: App Store Connect → My Apps → + → New App → Bundle ID: jdarray.JiaClock"
            echo "Then re-run this build."
            exit 1
          fi
          ls -la "$CM_BUILD_DIR/build/ios/ipa/"

      - name: Upload ipa to App Store Connect (verbose)
        script: |
          set -euo pipefail
          IPA=$(ls "$CM_BUILD_DIR"/build/ios/ipa/*.ipa | head -1)
          echo "Uploading: $IPA"
          # 跳过本地 validate，直接上传（validate 常因 ASC 未建 App 而失败）
          app-store-connect publish \
            --path "$IPA" \
            --altool-verbose-logging \
            --altool-retries 10 \
            --altool-retry-wait 30 \
            2>&1 | tee /tmp/app-store-publish.log || {
              echo "==== Upload failed — last 100 log lines ===="
              tail -100 /tmp/app-store-publish.log
              exit 1
            }

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/app-store-publish.log
      - /tmp/asc-apps.log
