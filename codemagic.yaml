# Codemagic CI for 小嘉时钟 (JiaClock)
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-native-ios-app/
#
# ── Codemagic 控制台一次性配置 ─────────────────────────────────────────────
# 1. https://codemagic.io → Add application → GitHub → WangFang88/JiaClock
# 2. 勾选 "Use codemagic.yaml"（不要用 UI 向导覆盖 yaml）
# 3. 先跑 jiaclock-ios-simulator（无需签名，验证工程能否编译）
# 4. TestFlight 见 README「Codemagic 配置」章节
# 5. 真机直装（绕过 TestFlight）→ workflow jiaclock-adhoc（需先注册 iPhone UDID）
#
# TestFlight workflow 使用下方 vars 里写死的 APP_STORE_APPLE_ID（6776895229）。
# 若用 Codemagic 环境变量组，须在应用设置里勾选启用 jiaclock_secrets，否则 $VAR 不会展开。

workflows:
  # ---------------------------------------------------------------------------
  # Workflow A: 模拟器编译 — 无需 Apple 签名，push 后自动跑
  # ---------------------------------------------------------------------------
  jiaclock-ios-simulator:
    name: JiaClock iOS Simulator Build
    max_build_duration: 45
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "*"
          include: true
      cancel_previous_builds: true

    environment:
      xcode: latest
      vars:
        XCODE_SCHEME: JiaClock
        XCODE_PROJECT: JiaClock.xcodeproj

    scripts:
      - name: List available simulators
        script: xcrun simctl list devices available | head -30

      - name: Simulator build (main app + widget extension)
        script: |
          set -euo pipefail
          xcodebuild build \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            | tee /tmp/xcodebuild.log \
            | xcpretty --color --simple

    publishing:
      scripts:
        - name: Build summary
          script: |
            echo "✅ Simulator build succeeded."
            echo "Next: configure signing and run jiaclock-testflight manually."

  # ---------------------------------------------------------------------------
  # Workflow B: 签名 .ipa → TestFlight（默认手动触发，配置完签名后再开自动）
  # ---------------------------------------------------------------------------
  jiaclock-testflight:
    name: JiaClock TestFlight
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      # 集成名称须与 Codemagic Team integrations 里一致（当前为 reminderapp）
      app_store_connect: reminderapp

    # 默认仅手动触发，避免签名未配好时 push 失败
    # 配置完成后可改为 push + main 分支自动构建：
    #   events: [push]
    #   branch_patterns: [{ pattern: main, include: true }]
    triggering:
      events: []

    environment:
      ios_signing:
        distribution_type: app_store
        # 主 App Bundle ID；Codemagic 会自动匹配 jdarray.JiaClock.*（含 Widget）
        bundle_identifier: jdarray.JiaClock
      vars:
        XCODE_SCHEME: JiaClock
        XCODE_PROJECT: JiaClock.xcodeproj
        # ASC → 小嘉时钟 → App 信息 → Apple ID（非 Bundle ID）
        APP_STORE_APPLE_ID: "6776895229"
      xcode: latest

    scripts:
      - name: Verify signing prerequisites
        script: |
          set -euo pipefail
          if [[ "${APP_STORE_APPLE_ID:-}" == *'$'* ]] || ! [[ "${APP_STORE_APPLE_ID:-}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: APP_STORE_APPLE_ID must be a numeric Apple ID (got: ${APP_STORE_APPLE_ID:-<empty>})."
            echo "Set it in codemagic.yaml vars or Codemagic UI environment group."
            exit 1
          fi
          echo "APP_STORE_APPLE_ID OK: $APP_STORE_APPLE_ID"

      # 签名文件请在 Codemagic → Code signing identities 里配置（Generate certificate + Fetch profiles）
      # 不要在构建脚本里 --create 证书，否则会报 "Cannot save Signing Certificates without certificate private key"

      - name: Apply provisioning profiles to Xcode project
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build signed ipa (app + JiaClockWidgetExtension)
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            2>&1 | tee /tmp/xcodebuild-ipa.log

      - name: Verify App Store Connect API access
        script: |
          set -euo pipefail
          echo "=== API key: reminderapp ==="
          echo "Expected bundle ID: jdarray.JiaClock"
          echo "APP_STORE_APPLE_ID: ${APP_STORE_APPLE_ID:-<not set>}"
          echo "--- Registered bundle IDs (grep JiaClock) ---"
          app-store-connect bundle-ids list 2>&1 | grep -i "JiaClock" || echo "NOT FOUND in Developer Portal"
          echo "--- App Store Connect apps (must contain jdarray.JiaClock) ---"
          app-store-connect apps list 2>&1 | tee /tmp/asc-apps.log
          if ! grep -qi "JiaClock" /tmp/asc-apps.log; then
            echo ""
            echo "ERROR: No App Store Connect app for jdarray.JiaClock."
            echo "Fix: App Store Connect → My Apps → + → New App → Bundle ID: jdarray.JiaClock"
            echo "Then re-run this build."
            exit 1
          fi
          ls -la "$CM_BUILD_DIR/build/ios/ipa/"

      - name: Upload ipa to App Store Connect (verbose)
        script: |
          set -euo pipefail
          IPA=$(ls "$CM_BUILD_DIR"/build/ios/ipa/*.ipa | head -1)
          echo "Uploading: $IPA"
          # 跳过本地 validate，直接上传（validate 常因 ASC 未建 App 而失败）
          app-store-connect publish \
            --path "$IPA" \
            --altool-verbose-logging \
            --altool-retries 10 \
            --altool-retry-wait 30 \
            2>&1 | tee /tmp/app-store-publish.log || {
              echo "==== Upload failed — last 100 log lines ===="
              tail -100 /tmp/app-store-publish.log
              exit 1
            }

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/app-store-publish.log
      - /tmp/asc-apps.log

  # ---------------------------------------------------------------------------
  # Workflow C: Ad Hoc 签名 .ipa → 直接装真机（绕过 TestFlight）
  # ---------------------------------------------------------------------------
  jiaclock-adhoc:
    name: JiaClock Ad Hoc (Direct Install)
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: reminderapp

    triggering:
      events: []

    # 不要用 ios_signing.distribution_type — 那只读 Codemagic UI 里已上传的 Ad Hoc profile。
    # 本 workflow 在构建时用 API 拉取 profile 到本机，再 use-profiles 签名。
    environment:
      vars:
        XCODE_SCHEME: JiaClock
        XCODE_PROJECT: JiaClock.xcodeproj
        BUNDLE_ID_MAIN: jdarray.JiaClock
        BUNDLE_ID_WIDGET: jdarray.JiaClock.JiaClockWidget
      xcode: latest

    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Verify Ad Hoc prerequisites
        script: |
          set -euo pipefail
          echo "=== Ad Hoc: direct install to registered iPhone ==="
          echo ""
          echo "Required: register iPhone UDID at developer.apple.com → Devices"
          echo ""
          echo "--- Registered devices ---"
          app-store-connect devices list 2>&1 | tee /tmp/adhoc-devices.log || true
          if ! grep -Eiq "udid|[0-9a-f]{8}-[0-9a-f]{4}-" /tmp/adhoc-devices.log 2>/dev/null; then
            echo ""
            echo "ERROR: No devices in Developer Portal."
            echo "Ad Hoc requires at least one registered iPhone UDID."
            exit 1
          fi

      - name: Fetch Ad Hoc signing files (main app + widget)
        script: |
          set -euo pipefail
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          CERTS_DIR="$HOME/Library/MobileDevice/Certificates"
          mkdir -p "$PROFILES_DIR" "$CERTS_DIR"
          for BUNDLE_ID in "$BUNDLE_ID_MAIN" "$BUNDLE_ID_WIDGET"; do
            echo "Fetching Ad Hoc signing files for $BUNDLE_ID ..."
            app-store-connect fetch-signing-files "$BUNDLE_ID" \
              --platform IOS \
              --type IOS_APP_ADHOC \
              --strict-match-identifier \
              --profiles-dir "$PROFILES_DIR" \
              --certificates-dir "$CERTS_DIR" \
              --create \
              --delete-stale-profiles
          done
          echo "--- Profiles on disk ---"
          ls -la "$PROFILES_DIR" || true
          echo "--- Certificates on disk ---"
          ls -la "$CERTS_DIR" || true
          if [ -z "$(ls -A "$PROFILES_DIR" 2>/dev/null)" ]; then
            echo "ERROR: No Ad Hoc profiles downloaded. Register UDID and ensure Distribution cert exists."
            exit 1
          fi

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Apply provisioning profiles to Xcode project
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build Ad Hoc ipa (app + JiaClockWidgetExtension)
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            2>&1 | tee /tmp/xcodebuild-adhoc.log
          ls -la "$CM_BUILD_DIR/build/ios/ipa/"

    publishing:
      scripts:
        - name: Install instructions
          script: |
            echo "✅ Ad Hoc ipa ready — download from build Artifacts."
            echo ""
            echo "Install on a registered iPhone (UDID must be in Ad Hoc profile):"
            echo "  • 爱思助手 — 工具箱 / 安装 ipa"
            echo "  • Apple Configurator (Mac) — 拖 ipa 到设备"
            echo "  • Sideloadly — 选 ipa + Apple ID  sideload"
            echo ""
            echo "Ad Hoc builds expire when the provisioning profile expires (~1 year)."
            echo "Re-register new devices → Fetch profiles → rebuild."

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild-adhoc.log
      - /tmp/adhoc-devices.log
