# Codemagic CI for 小嘉时钟 (JiaClock)
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-native-ios-app/
#
# ── Codemagic 控制台一次性配置 ─────────────────────────────────────────────
# 1. https://codemagic.io → Add application → GitHub → WangFang88/JiaClock
# 2. 勾选 "Use codemagic.yaml"（不要用 UI 向导覆盖 yaml）
# 3. 先跑 jiaclock-ios-simulator（无需签名，验证工程能否编译）
# 4. TestFlight 见 README「Codemagic 配置」章节
#
# 环境变量组（Settings → Environment variables → Add group: jiaclock_secrets）:
#   APP_STORE_APPLE_ID = App Store Connect 里应用的数字 Apple ID（非 Bundle ID）

workflows:
  # ---------------------------------------------------------------------------
  # Workflow A: 模拟器编译 — 无需 Apple 签名，push 后自动跑
  # ---------------------------------------------------------------------------
  jiaclock-ios-simulator:
    name: JiaClock iOS Simulator Build
    max_build_duration: 45
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "*"
          include: true
      cancel_previous_builds: true

    environment:
      xcode: latest
      vars:
        XCODE_SCHEME: JiaClock
        XCODE_PROJECT: JiaClock.xcodeproj

    scripts:
      - name: List available simulators
        script: xcrun simctl list devices available | head -30

      - name: Simulator build (main app + widget extension)
        script: |
          set -euo pipefail
          xcodebuild build \
            -project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            | tee /tmp/xcodebuild.log \
            | xcpretty --color --simple

    publishing:
      scripts:
        - name: Build summary
          script: |
            echo "✅ Simulator build succeeded."
            echo "Next: configure signing and run jiaclock-testflight manually."

  # ---------------------------------------------------------------------------
  # Workflow B: 签名 .ipa → TestFlight（默认手动触发，配置完签名后再开自动）
  # ---------------------------------------------------------------------------
  jiaclock-testflight:
    name: JiaClock TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      # 集成名称须与 Codemagic Team integrations 里一致（当前为 reminderapp）
      app_store_connect: reminderapp

    # 默认仅手动触发，避免签名未配好时 push 失败
    # 配置完成后可改为 push + main 分支自动构建：
    #   events: [push]
    #   branch_patterns: [{ pattern: main, include: true }]
    triggering:
      events: []

    environment:
      ios_signing:
        distribution_type: app_store
        # 主 App Bundle ID；Codemagic 会自动匹配 jdarray.JiaClock.*（含 Widget）
        bundle_identifier: jdarray.JiaClock
      groups:
        - jiaclock_secrets
      vars:
        XCODE_SCHEME: JiaClock
        XCODE_PROJECT: JiaClock.xcodeproj
        # 在 jiaclock_secrets 组里设置 APP_STORE_APPLE_ID（纯数字）
        APP_STORE_APPLE_ID: $APP_STORE_APPLE_ID
      xcode: latest

    scripts:
      - name: Verify signing prerequisites
        script: |
          set -euo pipefail
          if [ -z "${APP_STORE_APPLE_ID:-}" ] || [ "$APP_STORE_APPLE_ID" = "0000000000" ]; then
            echo "ERROR: Set APP_STORE_APPLE_ID in Codemagic group 'jiaclock_secrets'."
            echo "Find it in App Store Connect → App → App Information → Apple ID."
            exit 1
          fi

      - name: Fetch App Store signing files from Apple
        script: |
          set -euo pipefail
          # 主 App + 扩展（默认会匹配 jdarray.JiaClock.*）
          app-store-connect fetch-signing-files jdarray.JiaClock \
            --type IOS_APP_STORE \
            --create \
            --platform IOS
          # Widget 单独 Bundle ID，需 strict 匹配
          app-store-connect fetch-signing-files jdarray.JiaClock.JiaClockWidget \
            --type IOS_APP_STORE \
            --create \
            --platform IOS \
            --strict-match-identifier

      - name: Apply provisioning profiles to Xcode project
        script: xcode-project use-profiles

      - name: Increment build number
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR"
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build signed ipa (app + JiaClockWidgetExtension)
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: false
        beta_groups:
          - Internal Testers
